name: Deploy Spring Boot to EC2 via OIDC + SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-00d880e45d161945f

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Spring Boot App
        run: mvn clean package -DskipTests

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ✅ Upload jar to GitHub artifact storage (temporary public URL alternative avoided)
      - name: Prepare JAR
        run: |
          mkdir -p artifact
          cp target/*.jar artifact/app.jar

      - name: Deploy via SSM (download + run)
        run: |
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Spring Boot App" \
            --parameters "commands=[
              \"mkdir -p /home/ubuntu/app\",
              \"pkill -f app.jar || true\",
              \"wget -O /home/ubuntu/app/app.jar https://YOUR_PUBLIC_JAR_URL/app.jar || true\",
              \"nohup java -jar /home/ubuntu/app/app.jar > /home/ubuntu/app/app.log 2>&1 &\"
            ]" \
            --region $AWS_REGION

      - name: Verify EC2 status
        run: |
          aws ssm describe-instance-information \
            --region $AWS_REGION \
            --query "InstanceInformationList[*].[InstanceId,PingStatus]" \
            --output table
