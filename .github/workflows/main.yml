name: Deploy Spring Boot to EC2 via OIDC + SSM

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  INSTANCE_ID: i-00d880e45d161945f

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Spring Boot App
        run: mvn clean package -DskipTests

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Copy JAR + Deploy via SSM
        run: |
          JAR_FILE=$(ls target/*.jar | head -n 1)

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Spring Boot App" \
            --parameters "commands=[
              \"pkill -f app.jar || true\",
              \"mkdir -p /home/ubuntu/app\",
              \"rm -f /home/ubuntu/app/app.jar\",
              \"cat > /home/ubuntu/app/app.jar << 'EOF'\",
              \"$(base64 -w 0 $JAR_FILE)\",
              \"EOF\",
              \"base64 -d /home/ubuntu/app/app.jar > /home/ubuntu/app/app-real.jar || true\",
              \"mv /home/ubuntu/app/app-real.jar /home/ubuntu/app/app.jar || true\",
              \"nohup java -jar /home/ubuntu/app/app.jar > /home/ubuntu/app/app.log 2>&1 &\"
            ]" \
            --region $AWS_REGION

      - name: Verify Instance Status
        run: |
          aws ssm describe-instance-information \
            --region $AWS_REGION \
            --query "InstanceInformationList[*].[InstanceId,PingStatus]" \
            --output table
